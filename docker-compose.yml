services:
  postgres:
    image: postgres:16-alpine
    container_name: quizz-game-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: quizz
      POSTGRES_USER: quizz
      POSTGRES_PASSWORD: quizz_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 256m

  redis:
    image: redis:7-alpine
    container_name: quizz-game-redis
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    mem_limit: 96m

volumes:
  postgres_data:
  redis_data:
